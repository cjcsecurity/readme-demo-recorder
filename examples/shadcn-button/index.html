<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Button states — readme-demo-recorder example</title>
<style>
  :root {
    --bg: #fafafa;
    --ink: #09090b;
    --muted: #71717a;
    --border: #e4e4e7;
    --primary: #18181b;
    --primary-ink: #fafafa;
    --secondary: #f4f4f5;
    --destructive: #dc2626;
    --good: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #09090b;
      --ink: #fafafa;
      --muted: #a1a1aa;
      --border: #27272a;
      --primary: #fafafa;
      --primary-ink: #18181b;
      --secondary: #18181b;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  main {
    min-height: 100%;
    display: grid; place-items: center;
    padding: 48px 24px;
  }
  .stage {
    width: 720px; max-width: 100%;
    text-align: center;
  }
  h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: -0.02em; }
  p.lead { margin: 0 0 36px; color: var(--muted); }
  .row {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .btn {
    height: 38px; padding: 0 16px;
    font: 500 14px inherit;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background 120ms, border-color 120ms, transform 80ms;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--primary);
    color: var(--primary-ink);
  }
  .btn-primary:hover { opacity: .92; }
  .btn-secondary {
    background: var(--secondary);
    color: var(--ink);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: color-mix(in oklch, var(--secondary), var(--ink) 8%); }
  .btn-destructive {
    background: var(--destructive);
    color: white;
  }
  .btn-destructive:hover { filter: brightness(1.05); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border-color: transparent;
  }
  .btn-ghost:hover { background: var(--secondary); }
  .badge {
    display: inline-block;
    margin-top: 18px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px; color: var(--muted);
    min-height: 26px;
  }
  .badge.ok { color: var(--good); border-color: color-mix(in oklch, var(--good), transparent 60%); }
  .badge.warn { color: var(--destructive); border-color: color-mix(in oklch, var(--destructive), transparent 60%); }
</style>
</head>
<body>
<main>
  <section class="stage">
    <h1>Button</h1>
    <p class="lead">A minimal shadcn-style button family. Click any button.</p>
    <div class="row">
      <button class="btn btn-primary"   id="btnPrimary">Primary action</button>
      <button class="btn btn-secondary" id="btnSecondary">Secondary</button>
      <button class="btn btn-destructive" id="btnDestructive">Delete</button>
      <button class="btn btn-ghost"     id="btnGhost">Ghost</button>
    </div>
    <div class="badge" id="status">Click a button</div>
  </section>
</main>
<script>
  const status = document.getElementById('status');
  const wire = (id, msg, cls) => {
    document.getElementById(id).addEventListener('click', () => {
      status.textContent = msg;
      status.classList.remove('ok', 'warn');
      if (cls) status.classList.add(cls);
    });
  };
  wire('btnPrimary',     '✓ Primary action triggered',    'ok');
  wire('btnSecondary',   '· Secondary action triggered',  null);
  wire('btnDestructive', '✗ Destructive action triggered', 'warn');
  wire('btnGhost',       '· Ghost action triggered',      null);
</script>
</body>
</html>
